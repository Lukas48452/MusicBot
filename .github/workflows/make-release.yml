name: Make Release
on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version Number'
        required: true
        type: string
      info:
        description: 'Description of this Release'
        required: true
        type: string

jobs:
  build_jar:
    name: Build Jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set Version
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "version = \"Snapshot\""
          replace: "version = \"${{ github.event.inputs.version_number }}\""
          include: build.gradle.kts
      - name: Build with Gradle
        run: ./gradlew shadowJar
      - name: Rename jar
        run: mv build/libs/*-All.jar JMusicBot-${{ github.event.inputs.version_number }}.jar
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: JMusicBot-${{ github.event.inputs.version_number }}.jar
          if-no-files-found: error
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_jar
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: .
      - name: Show Artifacts
        run: ls -R
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.inputs.version_number }}
          name: Version ${{ github.event.inputs.version_number }}
          draft: true
          prerelease: false
          artifacts: "*.jar"
          body: |
            ${{ github.event.inputs.info }}

            ---
            ### Setup
            https://jmusicbot.com/setup
            https://jmusicbot.com/config
            # Download: [JMusicBot-${{ github.event.inputs.version_number }}.jar](https://github.com/jagrosh/MusicBot/releases/download/${{ github.event.inputs.version_number }}/JMusicBot-${{ github.event.inputs.version_number }}.jar)
  build_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build_jar
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version_number }}
            ghcr.io/${{ github.repository }}:latest
